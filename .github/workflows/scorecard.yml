name: OpenSSF Scorecard

on:
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write

    steps:
      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3 (latest)
        with:
          publish_results: true

          results_file: results.sarif
          results_format: sarif

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@e58424170fb0262c8d7ed60a2e84b9bffe205c67
        with:
          sarif_file: results.sarif


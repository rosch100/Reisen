name: CI

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  ci:
    name: CI
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
        with:
          xcode-version: latest-stable

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}-${{ hashFiles('**/Package.resolved') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}-

      - name: Build tests
        run: swift build --build-tests -v

      - name: Test
        env:
          CI: "true"
        run: bash ./Scripts/ci-test.sh

      - name: Publish legacy commit status "CI"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          sha='${{ github.sha }}'
          context='CI'
          run_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'

          # GitHub Branch Protection verlangt Status-Kontext "CI" (legacy commit status), nicht nur Check-Runs.
          case '${{ job.status }}' in
            success) state='success' ;;
            failure) state='failure' ;;
            cancelled) state='error' ;;
            *) state='error' ;;
          esac

          payload=$(cat <<EOF
          {
            "state": "${state}",
            "context": "${context}",
            "description": "CI workflow completed",
            "target_url": "${run_url}"
          }
          EOF
          )

          curl -sS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${sha}" \
            -d "${payload}" > /dev/null


name: CI

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Setup Swift via Swiftly (6.4.x)
        run: |
          set -euo pipefail
          SWIFTLY_PKG_URL="https://download.swift.org/swiftly/darwin/swiftly.pkg"
          curl -fsSL "$SWIFTLY_PKG_URL" -o swiftly.pkg
          /usr/sbin/installer -pkg ./swiftly.pkg -target CurrentUserHomeDirectory >/dev/null

          "${HOME}/.swiftly/bin/swiftly" init --quiet-shell-followup --assume-yes --no-modify-profile
          "${HOME}/.swiftly/bin/swiftly" install 6.4.x
          . "${HOME}/.swiftly/env.sh"
          swift --version

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}-${{ hashFiles('**/Package.resolved') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}-

      - name: Build tests
        run: swift build --build-tests -v

      - name: Test
        env:
          CI: "true"
        run: bash ./Scripts/ci-test.sh


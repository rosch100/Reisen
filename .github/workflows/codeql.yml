name: CodeQL

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "0 3 * * 2"

jobs:
  analyze:
    name: CodeQL (Swift + repo)
    runs-on: macos-26
    timeout-minutes: 45

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
        with:
          xcode-version: latest-stable

      - name: Detect Swift tools version
        id: swift_tools
        run: |
          set -euo pipefail
          swift_tools_version="$(awk -F'swift-tools-version:' '/swift-tools-version:/ { gsub(/^[[:space:]]+/, "", $2); gsub(/[^0-9.].*$/, "", $2); print $2; exit }' Package.swift)"
          echo "swift-version=${swift_tools_version}" >> "$GITHUB_OUTPUT"

      - name: Install matching Swift toolchain
        uses: fwal/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a
        with:
          swift-version: ${{ steps.swift_tools.outputs.swift-version }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e58424170fb0262c8d7ed60a2e84b9bffe205c67
        with:
          languages: swift
          build-mode: manual

      - name: Build (for CodeQL)
        run: swift build --build-tests -v

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e58424170fb0262c8d7ed60a2e84b9bffe205c67
        continue-on-error: true
        with:
          category: "/language:swift"


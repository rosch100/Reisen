name: CI

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@1242409711ff5721add51979e9e11e23ebb7e5a4
        with:
          xcode-version: "26.0"

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}-${{ hashFiles('**/Package.resolved') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}-

      - name: Build tests
        run: swift build --build-tests -v

      - name: Test
        env:
          CI: "true"
        run: bash ./Scripts/ci-test.sh


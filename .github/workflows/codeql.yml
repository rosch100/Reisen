name: CodeQL

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "0 3 * * 2"

jobs:
  analyze:
    name: CodeQL (Swift + repo)
    runs-on: macos-26
    timeout-minutes: 45

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Setup Swift via Swiftly (6.4.x)
        run: |
          set -euo pipefail
          SWIFTLY_PKG_URL="https://download.swift.org/swiftly/darwin/swiftly.pkg"
          curl -fsSL "$SWIFTLY_PKG_URL" -o swiftly.pkg
          /usr/sbin/installer -pkg ./swiftly.pkg -target CurrentUserHomeDirectory >/dev/null

          "${HOME}/.swiftly/bin/swiftly" init --quiet-shell-followup --assume-yes --no-modify-profile
          "${HOME}/.swiftly/bin/swiftly" install 6.4.x
          . "${HOME}/.swiftly/env.sh"
          swift --version

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      - name: Build (for CodeQL)
        run: swift build --build-tests -v

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/language:swift"


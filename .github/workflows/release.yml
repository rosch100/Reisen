name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build Release Artifact
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
        with:
          xcode-version: latest-stable

      - name: Detect Swift tools version
        id: swift_tools
        run: |
          set -euo pipefail
          swift_tools_version="$(awk -F': ' '/^\\/\\/ swift-tools-version:/ {print $2; exit 0}' Package.swift)"
          echo "swift-version=${swift_tools_version}" >> "$GITHUB_OUTPUT"

      - name: Install matching Swift toolchain
        uses: fwal/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a
        with:
          swift-version: ${{ steps.swift_tools.outputs.swift-version }}

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build .app (release)
        id: build
        run: |
          set -euo pipefail
          APP_PATH="$(bash ./Scripts/build-app.sh --configuration release)"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Signing/Notarize gate
        id: gate
        run: |
          set -euo pipefail
          gate=false
          if [[ -n "${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}" && \
                -n "${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}" && \
                -n "${{ secrets.APPLE_TEAM_ID }}" && \
                -n "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" && \
                -n "${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}" && \
                -n "${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}" ]]; then
            gate=true
          fi
          echo "enabled=$gate" >> "$GITHUB_OUTPUT"

      - name: Zip unsigned .app
        id: ZipUnsigned
        if: steps.gate.outputs.enabled != 'true'
        run: |
          set -euo pipefail
          APP_PATH="${{ steps.build.outputs.app_path }}"
          ZIP_PATH="$GITHUB_WORKSPACE/.build/Reisen-unsigned.zip"
          rm -f "$ZIP_PATH"
          mkdir -p "$(dirname "$ZIP_PATH")"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Sign & notarize .app (Developer ID)
        if: steps.gate.outputs.enabled == 'true'
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}
        run: |
          set -euo pipefail
          APP_PATH="${{ steps.build.outputs.app_path }}"
          SIGNED_APP_PATH="$(bash ./Scripts/sign-and-notarize.sh --app-path "$APP_PATH")"
          echo "signed_app_path=$SIGNED_APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Select signed artifact zip path
        if: steps.gate.outputs.enabled == 'true'
        id: artifact_paths
        run: |
          set -euo pipefail
          ZIP_PATH="$GITHUB_WORKSPACE/.build/notarize/Reisen.zip"
          if [[ ! -f "$ZIP_PATH" ]]; then
            echo "Fehler: erwartete ZIP-Datei nicht gefunden: $ZIP_PATH" >&2
            exit 1
          fi
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (Signed)
        if: steps.gate.outputs.enabled == 'true'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2 (latest)
        with:
          files: ${{ steps.artifact_paths.outputs.zip_path }}

      - name: Create GitHub Release (Unsigned)
        if: steps.gate.outputs.enabled != 'true'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2 (latest)
        with:
          files: ${{ steps.ZipUnsigned.outputs.zip_path }}


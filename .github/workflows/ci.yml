name: CI

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
        with:
          xcode-version: latest-stable

      - name: Detect Swift tools version
        id: swift_tools
        run: |
          set -euo pipefail
          swift_tools_version="$(awk -F': ' '/^\\/\\/ swift-tools-version:/ {print $2; exit 0}' Package.swift)"
          echo "swift-version=${swift_tools_version}" >> "$GITHUB_OUTPUT"

      - name: Install matching Swift toolchain
        uses: fwal/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a
        with:
          swift-version: ${{ steps.swift_tools.outputs.swift-version }}

      - name: Print toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}-${{ hashFiles('**/Package.resolved') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}-

      - name: Build tests
        run: swift build --build-tests -v

      - name: Test
        env:
          CI: "true"
        run: bash ./Scripts/ci-test.sh


name: CodeQL

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "0 3 * * 2"

jobs:
  analyze:
    name: CodeQL (Swift + repo)
    runs-on: macos-26
    timeout-minutes: 45

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@1242409711ff5721add51979e9e11e23ebb7e5a4
        with:
          xcode-version: "26.0"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@3b0bd1d116c0bde30213346b22d4f634d96a2fb0
        with:
          languages: swift
          build-mode: manual

      - name: Build (for CodeQL)
        run: swift build --build-tests -v

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@3b0bd1d116c0bde30213346b22d4f634d96a2fb0
        continue-on-error: true
        with:
          category: "/language:swift"


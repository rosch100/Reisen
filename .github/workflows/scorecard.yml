name: OpenSSF Scorecard

on:
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Run Scorecard
        uses: ossf/scorecard-action@v2
        with:
          publish_results: true

